name: CD Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy To Hostinger
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script_stop: true
          envs: APP_DIR,BRANCH,DEPLOY_BOT
          script: |
            set -euo pipefail
            export APP_DIR="${{ secrets.VPS_APP_DIR || '/var/www/auto_trade' }}"
            export BRANCH="main"
            export DEPLOY_BOT="${{ secrets.DEPLOY_BOT || 'false' }}"

            if [ ! -d "${APP_DIR}" ]; then
              echo "App directory not found: ${APP_DIR}"
              exit 1
            fi

            cd "${APP_DIR}"
            git fetch origin "${BRANCH}"
            git checkout "${BRANCH}"
            git pull --ff-only origin "${BRANCH}"

            chmod +x scripts/deploy.sh
            APP_DIR="${APP_DIR}" BRANCH="${BRANCH}" DEPLOY_BOT="${DEPLOY_BOT}" bash scripts/deploy.sh
