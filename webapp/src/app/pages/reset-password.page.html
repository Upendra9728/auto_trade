<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-7 col-lg-6">
      <div class="card">
        <div class="card-body">
          <h1 class="h4 mb-2">Reset Password</h1>
          <p class="text-muted mb-3">Request OTP on Gmail and verify it to set a new password.</p>

          <div *ngIf="alert" class="alert" [ngClass]="'alert-' + alert.type" role="alert">
            {{ alert.message }}
          </div>

          <div class="vstack gap-3">
            <div>
              <label class="form-label" for="email">Gmail</label>
              <input id="email" name="email" class="form-control" [(ngModel)]="email" required />
            </div>

            <button type="button" class="btn btn-outline-primary" (click)="requestOtp()" [disabled]="isRequesting">
              {{ isRequesting ? 'Sending OTP...' : 'Send OTP' }}
            </button>
          </div>

          <form (ngSubmit)="resetPassword()" class="vstack gap-3 mt-4" *ngIf="otpRequested">
            <div>
              <label class="form-label" for="otp">OTP</label>
              <input id="otp" name="otp" class="form-control" [(ngModel)]="otp" required />
            </div>
            <div>
              <label class="form-label" for="newPassword">New Password</label>
              <input
                id="newPassword"
                name="newPassword"
                type="password"
                class="form-control"
                [(ngModel)]="newPassword"
                required
              />
            </div>
            <div>
              <label class="form-label" for="confirmPassword">Confirm Password</label>
              <input
                id="confirmPassword"
                name="confirmPassword"
                type="password"
                class="form-control"
                [(ngModel)]="confirmPassword"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary" [disabled]="isResetting">
              {{ isResetting ? 'Updating...' : 'Update Password' }}
            </button>
          </form>

          <div class="mt-3">
            Back to <a routerLink="/login">login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
