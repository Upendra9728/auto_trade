<div class="container">
  <div class="row g-4 align-items-stretch">
    <div class="col-12 col-lg-5">
      <div class="app-auth-aside">
        <span class="app-pill">Password Reset</span>
        <h1 class="app-title mt-3">Recover access</h1>
        <p class="app-subtitle">Request an OTP, then set a new password securely.</p>
        <ul class="app-checklist">
          <li>OTP delivered to Gmail</li>
          <li>Secure credential update</li>
          <li>Instant access recovery</li>
        </ul>
      </div>
    </div>
    <div class="col-12 col-lg-7">
      <div class="card app-card h-100">
        <div class="card-body">
          <div class="app-card-header">
            <div>
              <h2 class="app-section-title">Reset password</h2>
              <p class="app-subtitle mb-0">Verify OTP to update your password.</p>
            </div>
          </div>

          <div class="app-alert-stack" *ngIf="alert as alertData">
            <app-alert
              [type]="alertData.type"
              [message]="alertData.message"
              [dismissible]="true"
              (closed)="alert = null"
            ></app-alert>
          </div>

          <div class="vstack gap-3">
            <div>
              <label class="form-label" for="email">Gmail</label>
              <input id="email" name="email" class="form-control" [(ngModel)]="email" required />
            </div>

            <button type="button" class="btn btn-outline-primary" (click)="requestOtp()" [disabled]="isRequesting">
              <span *ngIf="isRequesting" class="spinner-border spinner-border-sm me-2" role="status"></span>
              {{ isRequesting ? 'Sending OTP...' : 'Send OTP' }}
            </button>
          </div>

          <form (ngSubmit)="resetPassword()" class="vstack gap-3 mt-4" *ngIf="otpRequested">
            <div>
              <label class="form-label" for="otp">OTP</label>
              <input id="otp" name="otp" class="form-control" [(ngModel)]="otp" required />
            </div>
            <div>
              <label class="form-label" for="newPassword">New Password</label>
              <input
                id="newPassword"
                name="newPassword"
                type="password"
                class="form-control"
                [(ngModel)]="newPassword"
                required
              />
            </div>
            <div>
              <label class="form-label" for="confirmPassword">Confirm Password</label>
              <input
                id="confirmPassword"
                name="confirmPassword"
                type="password"
                class="form-control"
                [(ngModel)]="confirmPassword"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary" [disabled]="isResetting">
              <span *ngIf="isResetting" class="spinner-border spinner-border-sm me-2" role="status"></span>
              {{ isResetting ? 'Updating...' : 'Update Password' }}
            </button>
          </form>

          <div class="mt-4">
            Back to <a routerLink="/login">login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
