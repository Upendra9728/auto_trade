<div class="container">
  <div class="row g-4 align-items-stretch">
    <div class="col-12 col-lg-5">
      <div class="app-auth-aside">
        <span class="app-pill">Secure Access</span>
        <h1 class="app-title mt-3">Welcome back</h1>
        <p class="app-subtitle">Sign in to manage your Upstox token and consent settings.</p>
        <ul class="app-checklist">
          <li>Encrypted token storage</li>
          <li>Instant consent updates</li>
          <li>Fast admin sync</li>
        </ul>
      </div>
    </div>
    <div class="col-12 col-lg-7">
      <div class="card app-card h-100">
        <div class="card-body">
          <div class="app-card-header">
            <div>
              <h2 class="app-section-title">Sign in</h2>
              <p class="app-subtitle mb-0">Use your registered Gmail and password.</p>
            </div>
          </div>

          <div class="app-alert-stack" *ngIf="alert as alertData">
            <app-alert
              [type]="alertData.type"
              [message]="alertData.message"
              [dismissible]="true"
              (closed)="alert = null"
            ></app-alert>
          </div>

          <form (ngSubmit)="login()" class="vstack gap-3">
            <div>
              <label class="form-label" for="email">Gmail</label>
              <input id="email" name="email" class="form-control" [(ngModel)]="email" required />
            </div>
            <div>
              <label class="form-label" for="password">Password</label>
              <input
                id="password"
                name="password"
                type="password"
                class="form-control"
                [(ngModel)]="password"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary" [disabled]="isLoading">
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status"></span>
              {{ isLoading ? 'Signing in...' : 'Login' }}
            </button>
          </form>

          <div class="mt-4 d-flex flex-wrap justify-content-between gap-2">
            <a routerLink="/register">Create account</a>
            <a routerLink="/reset-password">Forgot password?</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
