<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
      <div class="card">
        <div class="card-body">
          <h1 class="h4 mb-2">Login</h1>
          <p class="text-muted mb-3">Sign in to manage your Upstox token.</p>

          <div *ngIf="alert" class="alert" [ngClass]="'alert-' + alert.type" role="alert">
            {{ alert.message }}
          </div>

          <form (ngSubmit)="login()" class="vstack gap-3">
            <div>
              <label class="form-label" for="email">Gmail</label>
              <input id="email" name="email" class="form-control" [(ngModel)]="email" required />
            </div>
            <div>
              <label class="form-label" for="password">Password</label>
              <input
                id="password"
                name="password"
                type="password"
                class="form-control"
                [(ngModel)]="password"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary" [disabled]="isLoading">
              {{ isLoading ? 'Signing in...' : 'Login' }}
            </button>
          </form>

          <div class="mt-3 d-flex justify-content-between">
            <a routerLink="/register">Create account</a>
            <a routerLink="/reset-password">Forgot password?</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
